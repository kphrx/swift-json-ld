# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  SWIFTLY: "1.1.1"

jobs:
  install-swiftly:

    runs-on: ubuntu-latest
    outputs:
      swiftly_dir: ${{ steps.configure-swiftly.outputs.home_dir }}
      cache_versions: ${{ steps.configure-swiftly.outputs.ci_versions }}
      versions: ${{ steps.setup-swiftly.outputs.ci_versions }}

    steps:
      - name: Cache Swift.org GPG keys
        uses: actions/cache@v5
        id: cache-swift-keys
        with:
          path: ${{ runner.temp }}/swift-gpg-key
          key: swift-keys-1
      - name: Download GPG keys
        if: steps.cache-swift-keys.outputs.cache-hit != 'true'
        working-directory: ${{ runner.temp }}
        run: |
          mkdir -p swift-gpg-key && cd swift-gpg-key
          curl -LO https://swift.org/keys/all-keys.asc
          if gunzip -t all-keys.asc 2>/dev/null; then
            mv all-keys.asc{,.gz}
            gunzip all-keys.asc.gz
          fi

      - name: Configure swiftly
        id: configure-swiftly
        run: |
          RUNNER_ARCH="${{ runner.arch }}"
          RUNNER_ARCH="${RUNNER_ARCH,,}"
          SWIFTLY_VERSION="${{ env.SWIFTLY }}/${RUNNER_ARCH}"
          SWIFTLY_HOME_DIR="${{ runner.tool_cache }}/swiftly/${SWIFTLY_VERSION}"
          SWIFTLY_BIN_DIR="${SWIFTLY_HOME_DIR}/bin"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          {
            echo "runner_machine=$(uname -m)"
            echo "version=${SWIFTLY_VERSION}"
            echo "home_dir=${SWIFTLY_HOME_DIR}"
            echo "bin_dir=${SWIFTLY_BIN_DIR}"
            echo "toolchains_dir=${SWIFTLY_HOME_DIR}/toolchains"
            echo "ci_versions=6.0-6.1-6.2"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Cache swiftly
        uses: actions/cache@v5
        with:
          path: ${{ steps.configure-swiftly.outputs.home_dir }}
          key: swift-${{ runner.os }}-${{ runner.arch }}-swiftly-${{ env.SWIFTLY }}-${{ steps.configure-swiftly.outputs.ci_versions }}-${{ hashFiles('.swift-version') }}
          restore-keys: |
            swift-${{ runner.os }}-${{ runner.arch }}-swiftly-${{ env.SWIFTLY }}-
      - name: Setup swiftly
        id: setup-swiftly
        env:
          DIST_NAME: swiftly-${{ env.SWIFTLY }}-${{ steps.configure-swiftly.outputs.runner_machine }}
          SWIFT_GPG_KEY: ${{ runner.temp }}/swift-gpg-key/all-keys.asc
          SWIFTLY_HOME_DIR: ${{ steps.configure-swiftly.outputs.home_dir }}
          SWIFTLY_BIN_DIR: ${{ steps.configure-swiftly.outputs.bin_dir }}
          SWIFTLY_TOOLCHAINS_DIR: ${{ steps.configure-swiftly.outputs.toolchains_dir }}
          TOOLCHAIN_VERSIONS: ${{ steps.configure-swiftly.outputs.ci_versions }}
        run: |
          if ! [ -d "$SWIFTLY_HOME_DIR" ] || ! [ -f "${SWIFTLY_HOME_DIR}/.complete" ]; then
            mkdir -p "$SWIFTLY_HOME_DIR" && cd "$SWIFTLY_HOME_DIR"

            curl -LO "https://download.swift.org/swiftly/linux/${DIST_NAME}.tar.gz"
            cat "$SWIFT_GPG_KEY" | gpg --import -
            curl -LO "https://download.swift.org/swiftly/linux/${DIST_NAME}.tar.gz.sig"
            gpg --verify "${DIST_NAME}.tar.gz.sig" "${DIST_NAME}.tar.gz"
            tar -xf "${DIST_NAME}.tar.gz"

            ./swiftly init --no-modify-profile --skip-install --quiet-shell-followup --assume-yes
            mv swiftly "$SWIFTLY_BIN_DIR"

            touch ".complete"

            cd ${{ github.workspace }}
          fi

          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          {
            echo -n 'ci_versions='
            {
              echo "["
              for version in $(echo "$TOOLCHAIN_VERSIONS" | tr '-' ' '); do
                swiftly install "$version" --verify --format json --assume-yes | jq -c 'del(.alreadyInstalled) | .current = false'
                echo ","
              done
              swiftly install --verify --format json --assume-yes | jq -c 'del(.alreadyInstalled) | .current = true'
              echo "]"
            } | jq -cr .
          } >> "$GITHUB_OUTPUT"
      - name: Cache swiftly
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.configure-swiftly.outputs.home_dir }}
          key: swift-${{ runner.os }}-${{ runner.arch }}-swiftly-${{ env.SWIFTLY }}-${{ steps.configure-swiftly.outputs.ci_versions }}-${{ hashFiles('.swift-version') }}

  soundness:

    uses: swiftlang/github-workflows/.github/workflows/soundness.yml@0.0.9
    with:
      unacceptable_language_check_enabled: false
      shell_check_enabled: false
      python_lint_check_enabled: false

  build:

    runs-on: ubuntu-latest
    needs: [install-swiftly, soundness]
    strategy:
      matrix:
        include: ${{ fromJson(needs.install-swiftly.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Restore swiftly
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          path: ${{ needs.install-swiftly.outputs.swiftly_dir }}
          key: swift-${{ runner.os }}-${{ runner.arch }}-swiftly-${{ env.SWIFTLY }}-${{ needs.install-swiftly.outputs.cache_versions }}-${{ hashFiles('.swift-version') }}
      - name: Setup swiftly
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          . ${{ needs.install-swiftly.outputs.swiftly_dir }}/env.sh
          {
            echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR"
            echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR"
            echo "SWIFTLY_TOOLCHAINS_DIR=$SWIFTLY_TOOLCHAINS_DIR"
          } >> "$GITHUB_ENV"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build
        run: swiftly run -- swift build ${{ runner.debug == '1' && '--very-verbose' || '--verbose' }} +${{ matrix.version }}

      - name: Checkout w3c/json-ld-api
        if: ${{ matrix.current }}
        uses: actions/checkout@v6
        with:
          repository: w3c/json-ld-api
          path: vender/json-ld-api
      - name: Run tests
        env:
          JSONLD_TEST_FIXTURES: ${{ github.workspace }}/vender/json-ld-api/tests/
        run: swiftly run -- swift test --disable-xctest --enable-code-coverage ${{ runner.debug == '1' && '--very-verbose' || '--verbose' }}
      - name: Generate lcov report
        if: ${{ matrix.current }}
        run: |
          BINARY_PATH="$(swiftly run -- swift build --show-bin-path)"
          CODECOV_PATH="$(swiftly run -- swift test --show-codecov-path | xargs dirname)"
          swiftly run -- llvm-cov report -ignore-filename-regex="/.build/|/Tests/" -instr-profile "${CODECOV_PATH}/default.profdata" "${BINARY_PATH}/swift-json-codablePackageTests.xctest" \
            | sed 's/  \+/|/g;s/--\+/||||||||||||/;2s/|/-|/g;s/-|$/-|-/' >> "$GITHUB_STEP_SUMMARY"

  build-conclusion:

    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: exit 0

  docs:

    runs-on: ubuntu-latest
    needs: [install-swiftly, soundness]

    steps:
      - uses: actions/checkout@v6

      - name: Restore swiftly
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          path: ${{ needs.install-swiftly.outputs.swiftly_dir }}
          key: swift-${{ runner.os }}-${{ runner.arch }}-swiftly-${{ env.SWIFTLY }}-${{ needs.install-swiftly.outputs.cache_versions }}-${{ hashFiles('.swift-version') }}
      - name: Setup swiftly
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          . ${{ needs.install-swiftly.outputs.swiftly_dir }}/env.sh
          {
            echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR"
            echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR"
            echo "SWIFTLY_TOOLCHAINS_DIR=$SWIFTLY_TOOLCHAINS_DIR"
          } >> "$GITHUB_ENV"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"

      - uses: actions/configure-pages@v6
        id: pages

      - name: Build documentation arguments
        id: docs-args
        env:
          SOURCE_BASE_URL: ${{ github.server_url }}/${{ github.event.pull_request.head.repo.full_name || github.repository }}/blob/${{ github.head_ref || github.ref_name }}
        run: |
          if [ "$(swift package dump-package | jq -r '.products | length')" != "1" ]; then
            echo "combined=--enable-experimental-combined-documentation" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ steps.pages.outputs.base_path }}" ]; then
            echo "base_path=--hosting-base-path ${{ steps.pages.outputs.base_path }}" >> "$GITHUB_OUTPUT"
          fi
          echo "source_base_url=$SOURCE_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Generate documentation
        env:
          ENABLE_SWIFT_PLUGIN: "1"
        run: |
          swiftly run -- swift package ${{ runner.debug == '1' && '--very-verbose' || '--verbose' }} plugin --allow-writing-to-package-directory \
            generate-documentation --output-path _site/ \
            --disable-indexing ${{ steps.docs-args.outputs.combined }} --symbol-graph-minimum-access-level public \
            --checkout-path "$PWD" --source-service github --source-service-base-url ${{ steps.docs-args.outputs.source_base_url }} \
            --transform-for-static-hosting ${{ steps.docs-args.outputs.base_path }}

      - name: Redirect /index.html to top level landing page
        run: |
          mv _site/{index,404}.html
          cat <<'EOF' | sed 's#{{BASE_PATH}}#${{ steps.pages.outputs.base_path }}#g' | sed "s#{{DOCUMENT_PATH}}#$(jq -r '.interfaceLanguages.swift[0].path' _site/index/index.json)#g" | tee _site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url={{BASE_PATH}}{{DOCUMENT_PATH}}">
          <title>Redirecting...</title>
          <style>
            :root { color-scheme: light dark; }
            body {
              font-family: sans-serif;
              background-color: light-dark(#ffffff, #000000);
              color: light-dark(#000000, #ffffff);
              text-align: center;
              margin-top: 5rem;
            }
            a { color: light-dark(#3366ff, #0099ff); text-decoration: none; }
            a:hover { text-decoration: underline; }
          </style>
          </head>
          <body>
            <p>Redirecting to <a href="{{BASE_PATH}}{{DOCUMENT_PATH}}">documentation</a>...</p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v4

  deploy:

    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name != 'pull_request'
    concurrency:
      group: pages
      cancel-in-progress: true

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
